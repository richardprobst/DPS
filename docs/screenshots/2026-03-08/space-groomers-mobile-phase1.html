<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Space Groomers - Fase 1</title>
<link rel="stylesheet" href="../../../plugins/desi-pet-shower-game/assets/css/space-groomers.css" />
<style>body{margin:0;padding:16px;background:#10131f;}</style>
</head>
<body>
<div class="dps-space-groomers" data-context="shortcode">
    <div class="dps-sg-wrapper">
        <canvas class="dps-sg-canvas" width="480" height="640"></canvas>
        <div class="dps-sg-hud">
            <div class="dps-sg-hud__score"><span class="dps-sg-hud__label">Pontos</span><span class="dps-sg-hud__value dps-sg-score">0</span></div>
            <div class="dps-sg-hud__wave"><span class="dps-sg-hud__label">Onda</span><span class="dps-sg-hud__value dps-sg-wave">1</span></div>
            <div class="dps-sg-hud__lives"><span class="dps-sg-hud__label">Vida</span><span class="dps-sg-hud__value dps-sg-lives">❤️❤️❤️</span></div>
        </div>
        <div class="dps-sg-combo dps-sg-combo--hidden"><span class="dps-sg-combo__text">x2</span></div>
        <div class="dps-sg-powerup-indicator dps-sg-powerup-indicator--hidden"><span class="dps-sg-powerup-indicator__icon"></span><span class="dps-sg-powerup-indicator__name"></span><div class="dps-sg-powerup-indicator__bar"><div class="dps-sg-powerup-indicator__fill"></div></div></div>
        <div class="dps-sg-special-bar"><span class="dps-sg-special-bar__label">Especial</span><div class="dps-sg-special-bar__track"><div class="dps-sg-special-bar__fill"></div></div></div>
        <div class="dps-sg-mobile-controls"><p class="dps-sg-mobile-controls__hint">Arraste para mover · tiro automático</p><button type="button" class="dps-sg-btn dps-sg-btn--special" disabled>⚡</button></div>
        <div class="dps-sg-overlay dps-sg-overlay--start">
            <div class="dps-sg-overlay__content">
                <h2 class="dps-sg-overlay__title">🚀 Space Groomers</h2>
                <p class="dps-sg-overlay__subtitle">Invasão das Pulgas</p>
                <p class="dps-sg-overlay__desc">Defenda o Pet-Planeta dos invasores em partidas rápidas!</p>
                <p class="dps-sg-overlay__highscore">Seu recorde: <span class="dps-sg-highscore-value">0</span></p>
                <button type="button" class="dps-sg-btn dps-sg-btn--play">Toque para começar 🫧</button>
                <p class="dps-sg-overlay__controls-hint"><small>Tutorial rápido: arraste para mover. O secador atira sozinho.</small></p>
            </div>
        </div>
        <div class="dps-sg-overlay dps-sg-overlay--gameover dps-sg-overlay--hidden"><div class="dps-sg-overlay__content"></div></div>
        <div class="dps-sg-overlay dps-sg-overlay--victory dps-sg-overlay--hidden"><div class="dps-sg-overlay__content"></div></div>
        <div class="dps-sg-overlay dps-sg-overlay--wave dps-sg-overlay--hidden"><div class="dps-sg-overlay__content"></div></div>
    </div>
</div>
<script src="../../../plugins/desi-pet-shower-game/assets/js/space-groomers.js"></script>
</body>
</html>
